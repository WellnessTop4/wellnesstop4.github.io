<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .tool {
            background: #1e293b;
            padding: 25px;
            margin: 25px 0;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .tool:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        input, textarea, select {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 6px;
            border: none;
            background: #0f172a;
            color: white;
        }

        button {
            padding: 10px 18px;
            margin: 6px;
            border: none;
            border-radius: 6px;
            background: #06b6d4;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0891b2;
        }

        .result {
            background: #020617;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            white-space: pre-wrap;
        }

        footer {
            margin-top: 40px;
        }

        footer a {
            color: #06b6d4;
            margin: 0 8px;
            cursor: pointer;
            font-weight: bold;
        }

        section {
            display: none;
        }

        .tool canvas {
            display: none;
        }
    </style>
</head>

<section id="home" style="display:block">
    <p id="introText"></p>

    <div class="container">
        <!-- Hashtag Generator -->
        <div class="tool">
            <h2 id="hashtagTitle"></h2>
            <input id="hashtagInput" placeholder="">
            <button id="hashtagButton" onclick="generateHashtags()"></button>
            <div id="hashtagResult" class="result"></div>
            <button onclick="copyResult('hashtagResult')">Copy</button>
            <button onclick="downloadTXT('hashtagResult')">TXT</button>
            <button onclick="downloadCSV('hashtagResult')">CSV</button>
            <button onclick="downloadPDF('hashtagResult')">PDF</button>
        </div>

        <!-- YouTube Title Generator -->
        <div class="tool">
            <h2 id="ytTitle"></h2>
            <input id="ytInput" placeholder="">
            <button id="ytButton" onclick="generateYT()"></button>
            <div id="ytResult" class="result"></div>
            <button onclick="copyResult('ytResult')">Copy</button>
            <button onclick="downloadTXT('ytResult')">TXT</button>
            <button onclick="downloadPDF('ytResult')">PDF</button>
        </div>

        <!-- Logo Generator -->
        <div class="tool">
            <h2 id="logoTitle">Logo Generator</h2>
            <input id="logoTextInput" placeholder="Enter text for logo">
            <input type="file" id="logoImageInput" accept="image/*">
            <button id="logoButton" onclick="generateLogo()">Generate Logo</button>
            <canvas id="logoCanvas" style="display:none;"></canvas>
            <div id="logoResult" class="result"></div>
            <button onclick="downloadLogo()">Download Logo as PNG</button>
        </div>
    </div>
</section>

<section id="about"><h2>About</h2><p id="aboutText"></p></section>
<section id="privacy"><h2>Privacy</h2><p id="privacyText"></p></section>
