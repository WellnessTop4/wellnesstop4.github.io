<script>
// --- Language texts
const langTexts={
en:{intro:"Free tools for content creators.",hashtagTitle:"Hashtag Generator",hashtagButton:"Generate",ytTitle:"YouTube Title Generator",ytButton:"Generate",ttTitle:"TikTok Caption Generator",ttButton:"Generate",emojiTitle:"Emoji Enhancer",emojiButton:"Enhance",wordTitle:"Word Counter",imageTitle:"Image Converter (PNG)",about:"This site offers free creator tools.",privacy:"We do not collect personal data.",guide:"Use the tools to create better content.",yt:["10 Things About {t}","Why {t} Is Trending","Beginner Guide To {t}"],tt:["{t} hack 🔥","Trying {t} trend 🚀","{t} changed everything 😳"],word:"Words: {w} | Characters: {c}"},
da:{intro:"Gratis værktøjer til content creators.",hashtagTitle:"Hashtag generator",hashtagButton:"Generer",ytTitle:"YouTube titel generator",ytButton:"Generer",ttTitle:"TikTok tekst generator",ttButton:"Generer",emojiTitle:"Emoji forstærker",emojiButton:"Forstærk",wordTitle:"Ord tæller",imageTitle:"Billed konverter",about:"Denne side giver gratis værktøjer.",privacy:"Vi indsamler ingen personlige data.",guide:"Brug værktøjerne til bedre indhold.",yt:["10 ting om {t}","Hvorfor {t} trender","Begynder guide til {t}"],tt:["{t} hack 🔥","Tester {t} trend 🚀","{t} ændrede alt 😳"],word:"Ord: {w} | Tegn: {c}"},
es:{intro:"Herramientas gratis para creadores.",hashtagTitle:"Generador de hashtags",hashtagButton:"Generar",ytTitle:"Generador de títulos YouTube",ytButton:"Generar",ttTitle:"Generador de captions TikTok",ttButton:"Generar",emojiTitle:"Mejorador de emojis",emojiButton:"Mejorar",wordTitle:"Contador de palabras",imageTitle:"Convertidor de imágenes",about:"Este sitio ofrece herramientas gratis.",privacy:"No recopilamos datos personales.",guide:"Usa las herramientas para contenido.",yt:["10 cosas sobre {t}","Por qué {t} es tendencia","Guía para {t}"],tt:["{t} hack 🔥","Probando {t} trend 🚀","{t} cambió todo 😳"],word:"Palabras: {w} | Caracteres: {c}"},
de:{intro:"Kostenlose Tools für Creator.",hashtagTitle:"Hashtag Generator",hashtagButton:"Generieren",ytTitle:"YouTube Titel Generator",ytButton:"Generieren",ttTitle:"TikTok Caption Generator",ttButton:"Generieren",emojiTitle:"Emoji Verstärker",emojiButton:"Verbessern",wordTitle:"Wortzähler",imageTitle:"Bild Konverter",about:"Diese Seite bietet kostenlose Tools.",privacy:"Wir sammeln keine persönlichen Daten.",guide:"Nutze die Tools für besseren Content.",yt:["10 Dinge über {t}","Warum {t} im Trend ist","Guide zu {t}"],tt:["{t} hack 🔥","Teste {t} Trend 🚀","{t} verändert alles 😳"],word:"Wörter: {w} | Zeichen: {c}"},
fr:{intro:"Outils gratuits pour créateurs.",hashtagTitle:"Générateur de hashtags",hashtagButton:"Générer",ytTitle:"Générateur de titres YouTube",ytButton:"Générer",ttTitle:"Générateur de captions TikTok",ttButton:"Générer",emojiTitle:"Améliorateur d'emojis",emojiButton:"Améliorer",wordTitle:"Compteur de mots",imageTitle:"Convertisseur d'images",about:"Ce site offre des outils gratuits.",privacy:"Nous ne collectons pas de données.",guide:"Utilisez les outils pour créer.",yt:["10 choses sur {t}","Pourquoi {t} est tendance","Guide sur {t}"],tt:["{t} hack 🔥","Test {t} trend 🚀","{t} change tout 😳"],word:"Mots: {w} | Caractères: {c}"}
}

// --- Update language
function updateLanguage(){
let l=document.getElementById("language").value
let t=langTexts[l]
introText.innerText=t.intro
hashtagTitle.innerText=t.hashtagTitle
hashtagButton.innerText=t.hashtagButton
ytTitle.innerText=t.ytTitle
ytButton.innerText=t.ytButton
ttTitle.innerText=t.ttTitle
ttButton.innerText=t.ttButton
emojiTitle.innerText=t.emojiTitle
emojiButton.innerText=t.emojiButton
wordTitle.innerText=t.wordTitle
imageTitle.innerText=t.imageTitle
aboutText.innerText=t.about
privacyText.innerText=t.privacy
guideText.innerText=t.guide
}

// --- Tools ---
function generateHashtags(){
let word=document.getElementById("hashtagInput").value
if(!word) return
let tags=[]
let extras=["tips","viral","creator","content","trend","video","daily","growth","pro","idea"]
for(let i=0;i<100;i++){
let e=extras[Math.floor(Math.random()*extras.length)]
tags.push("#"+word+e+i)
}
document.getElementById("hashtagResult").innerText=tags.join(" ")
}

function generateYT(){
let l=document.getElementById("language").value
let t=ytInput.value
ytResult.innerText=langTexts[l].yt.map(x=>x.replace("{t}",t)).join("\n")
}

function generateTT(){
let l=document.getElementById("language").value
let t=ttInput.value
ttResult.innerText=langTexts[l].tt.map(x=>x.replace("{t}",t)).join("\n")
}

function addEmoji(){
let e=["🔥","🚀","😎","✨"]
emojiResult.innerText=emojiInput.value+" "+e[Math.floor(Math.random()*e.length)]
}

function countWords(){
let l=document.getElementById("language").value
let text=wordInput.value
let w=text.trim().split(/\s+/).length
let c=text.length
wordResult.innerText=langTexts[l].word.replace("{w}",w).replace("{c}",c)
}

function convertImage(){
let file=imageInput.files[0]
if(!file) return
let reader=new FileReader()
reader.onload=function(e){
let img=new Image()
img.onload=function(){
let canvas=document.createElement("canvas")
canvas.width=img.width
canvas.height=img.height
let ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0)
let url=canvas.toDataURL("image/png")
downloadImage.href=url
downloadImage.download="converted.png"
downloadImage.innerText="Download PNG"
}
img.src=e.target.result
}
reader.readAsDataURL(file)
}

function convertImagePDF(){
let file=imageInput.files[0]
if(!file) return
let reader=new FileReader()
reader.onload=function(e){
let img=new Image()
img.onload=function(){
const { jsPDF } = window.jspdf
let pdf=new jsPDF()
pdf.addImage(img,"PNG",10,10,180,0)
pdf.save("image.pdf")
}
img.src=e.target.result
}
reader.readAsDataURL(file)
}

function generatePassword(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
let pass=""
for(let i=0;i<16;i++){pass+=chars[Math.floor(Math.random()*chars.length)]}
passwordResult.innerText=pass
}

function generateColor(){
let color="#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0")
colorResult.innerHTML=color+"<br><div style='width:100%;height:40px;background:"+color+"'></div>"
}

function generateQR(){
QRCode.toCanvas(qrCanvas,qrInput.value,{width:200})
}

function downloadQR(){
let canvas=document.getElementById("qrCanvas")
let link=document.createElement("a")
link.download="qr-code.png"
link.href=canvas.toDataURL()
link.click()
}

function convertCase(type){
let t=caseInput.value
if(type=="upper")caseResult.innerText=t.toUpperCase()
if(type=="lower")caseResult.innerText=t.toLowerCase()
if(type=="title")caseResult.innerText=t.replace(/\w\S*/g,w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase())
}

// --- Copy & Download functions ---
function copyResult(id){
let text=document.getElementById(id).innerText
navigator.clipboard.writeText(text)
alert("Copied")
}

function downloadTXT(id){
let text=document.getElementById(id).innerText
let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ai-result.txt"
a.click()
}

function downloadPDF(id){
let text=document.getElementById(id).innerText
const { jsPDF } = window.jspdf
let pdf=new jsPDF()
pdf.text(text,10,10)
pdf.save("ai-result.pdf")
}

function downloadCSV(id){
let text=document.getElementById(id).innerText
let csv=text.replace(/ /g,"\n")
let blob=new Blob([csv],{type:"text/csv"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="hashtags.csv"
a.click()
}

// --- Section navigation ---
function showSection(id){
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
window.scrollTo({top:0,behavior:"smooth"})
}

// --- Initialize ---
updateLanguage()
</script>

<div class="tool">
    <h2>Logo Generator</h2>
    <input id="logoTextInput" placeholder="Indtast tekst til logo">
    <input type="file" id="logoImageInput" accept="image/*">
    <button onclick="generateLogo()">Generer Logo</button>
    <canvas id="logoCanvas" style="display:none;"></canvas>
    <div id="logoResult" class="result">
        <!-- Det genererede logo vises her -->
    </div>
    <button onclick="downloadLogo()">Download Logo som PNG</button>
</div>

<script>
    // JavaScript til Logo Generator
    function generateLogo() {
        let text = document.getElementById("logoTextInput").value;
        let fileInput = document.getElementById("logoImageInput");
        let canvas = document.getElementById("logoCanvas");
        let ctx = canvas.getContext("2d");

        if (!text) return alert("Indtast venligst noget tekst til logoet!");
        if (fileInput.files.length === 0) return alert("Vælg venligst et billede!");

        let image = new Image();
        image.onload = function () {
            // Sæt canvas størrelse baseret på billedets dimensioner
            canvas.width = image.width;
            canvas.height = image.height;

            // Tegn billedet på canvas
            ctx.drawImage(image, 0, 0);

            // Tilføj tekst til logoet
            ctx.font = '40px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            // Vis canvas som billede på hjemmesiden
            let dataUrl = canvas.toDataURL("image/png");
            document.getElementById("logoResult").innerHTML = `<img src="${dataUrl}" alt="Generated Logo">`;
        };

        // Læs billedet fra input
        let reader = new FileReader();
        reader.onload = function (e) {
            image.src = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // Funktion til at downloade logoet som en PNG-fil
    function downloadLogo() {
        let canvas = document.getElementById("logoCanvas");
        let dataUrl = canvas.toDataURL("image/png");

        let link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'logo.png';
        link.click();
    }
</script>
