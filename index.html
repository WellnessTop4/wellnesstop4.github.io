<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools For Creators</title>
    <style>
        body { font-family: Arial, sans-serif; background:#0f172a; color:white; margin:0; padding:0; }
        header { text-align:center; padding:20px; }
        h1 { margin:0; }
        select { padding:10px; border-radius:6px; border:none; background:#1e293b; color:white; margin-top:10px; }
        nav { display:flex; justify-content:center; gap:15px; background:#1e293b; padding:10px; flex-wrap:wrap; }
        nav a { color:#06b6d4; text-decoration:none; cursor:pointer; font-weight:bold; }
        nav a:hover { text-decoration:underline; }
        .container { max-width:1200px; margin:auto; padding:20px; }
        .tools-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px; }
        .tool { background:#1e293b; padding:25px; border-radius:12px; }
        input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:none; background:#0f172a; color:white; }
        button { padding:10px 18px; margin:6px 0; border:none; border-radius:6px; background:#06b6d4; color:white; cursor:pointer; font-weight:bold; width:100%; }
        button:hover { background:#0891b2; }
        .result { background:#020617; padding:12px; border-radius:6px; margin-top:10px; white-space:pre-wrap; }
        canvas { display:none; }
        section { display:none; }
        section.active { display:block; }
        footer { text-align:center; padding:20px; background:#1e293b; margin-top:20px; }
    </style>
</head>
<body>

<header>
    <h1>AI Tools For Creators</h1>
    <select id="language" onchange="updateLanguage()">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
    </select>
</header>

<!-- Google AdSense Top -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('privacy')">Privacy</a>
    <a onclick="showSection('guide')">Guide</a>
</nav>

<section id="home" class="active">
    <div class="container">
        <p id="introText"></p>
        <div class="tools-grid">

            <!-- Hashtag Generator -->
            <div class="tool">
                <h2 id="hashtagTitle"></h2>
                <input id="hashtagInput" placeholder="">
                <button id="hashtagButton" onclick="generateHashtags()"></button>
                <div id="hashtagResult" class="result"></div>
                <button onclick="copyResult('hashtagResult')">Copy</button>
                <button onclick="downloadTXT('hashtagResult')">TXT</button>
                <button onclick="downloadCSV('hashtagResult')">CSV</button>
                <button onclick="downloadPDF('hashtagResult')">PDF</button>
            </div>

            <!-- YouTube Title Generator -->
            <div class="tool">
                <h2 id="ytTitle"></h2>
                <input id="ytInput" placeholder="">
                <button id="ytButton" onclick="generateYT()"></button>
                <div id="ytResult" class="result"></div>
                <button onclick="copyResult('ytResult')">Copy</button>
                <button onclick="downloadTXT('ytResult')">TXT</button>
                <button onclick="downloadPDF('ytResult')">PDF</button>
            </div>

            <!-- TikTok Caption Generator -->
            <div class="tool">
                <h2 id="ttTitle"></h2>
                <input id="ttInput" placeholder="">
                <button id="ttButton" onclick="generateTT()"></button>
                <div id="ttResult" class="result"></div>
                <button onclick="copyResult('ttResult')">Copy</button>
                <button onclick="downloadTXT('ttResult')">TXT</button>
                <button onclick="downloadPDF('ttResult')">PDF</button>
            </div>

            <!-- Emoji Enhancer -->
            <div class="tool">
                <h2 id="emojiTitle"></h2>
                <textarea id="emojiInput" placeholder=""></textarea>
                <button id="emojiButton" onclick="addEmoji()"></button>
                <div id="emojiResult" class="result"></div>
                <button onclick="copyResult('emojiResult')">Copy</button>
                <button onclick="downloadTXT('emojiResult')">TXT</button>
                <button onclick="downloadPDF('emojiResult')">PDF</button>
            </div>

            <!-- Word Counter -->
            <div class="tool">
                <h2 id="wordTitle"></h2>
                <textarea id="wordInput"></textarea>
                <button onclick="countWords()">Count</button>
                <div id="wordResult" class="result"></div>
                <button onclick="copyResult('wordResult')">Copy</button>
                <button onclick="downloadTXT('wordResult')">TXT</button>
                <button onclick="downloadPDF('wordResult')">PDF</button>
            </div>

            <!-- Image Converter -->
            <div class="tool">
                <h2 id="imageTitle"></h2>
                <input type="file" id="imageInput">
                <button onclick="convertImage()">Convert PNG</button>
                <button onclick="convertImagePDF()">Convert PDF</button>
                <br><br>
                <a id="downloadImage"></a>
            </div>

            <!-- Password Generator -->
            <div class="tool">
                <h2>Password Generator</h2>
                <button onclick="generatePassword()">Generate</button>
                <div id="passwordResult" class="result"></div>
                <button onclick="copyResult('passwordResult')">Copy</button>
                <button onclick="downloadTXT('passwordResult')">TXT</button>
                <button onclick="downloadPDF('passwordResult')">PDF</button>
            </div>

            <!-- Random Color Generator -->
            <div class="tool">
                <h2>Random Color Generator</h2>
                <button onclick="generateColor()">Generate</button>
                <div id="colorResult" class="result"></div>
                <button onclick="copyResult('colorResult')">Copy</button>
                <button onclick="downloadTXT('colorResult')">TXT</button>
                <button onclick="downloadPDF('colorResult')">PDF</button>
            </div>

            <!-- QR Code Generator -->
            <div class="tool">
                <h2>QR Code Generator</h2>
                <input id="qrInput" placeholder="">
                <button onclick="generateQR()">Generate</button>
                <button onclick="downloadQR()">Download QR</button>
                <br>
                <canvas id="qrCanvas"></canvas>
            </div>

            <!-- Text Case Converter -->
            <div class="tool">
                <h2>Text Case Converter</h2>
                <textarea id="caseInput"></textarea>
                <button onclick="convertCase('upper')">UPPER</button>
                <button onclick="convertCase('lower')">lower</button>
                <button onclick="convertCase('title')">Title</button>
                <div id="caseResult" class="result"></div>
                <button onclick="copyResult('caseResult')">Copy</button>
                <button onclick="downloadTXT('caseResult')">TXT</button>
                <button onclick="downloadPDF('caseResult')">PDF</button>
            </div>

            <!-- Logo Generator -->
            <div class="tool">
                <h2>Logo Generator</h2>
                <input id="logoTextInput" placeholder="Enter text for logo">
                <input type="file" id="logoImageInput" accept="image/*">
                <button onclick="generateLogo()">Generate Logo</button>
                <canvas id="logoCanvas" style="display:none;"></canvas
