<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Mega - 40+ Tools</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8036688230923764" crossorigin="anonymous"></script>

<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#111;color:white;}
header{padding:20px;text-align:center;background:#000;}
header h1{margin:0;font-size:2em;}
header p{margin:5px 0 0 0;}
nav{text-align:center;margin:10px;flex-wrap:wrap;display:flex;justify-content:center;}
nav button{margin:5px;padding:8px 15px;border:none;border-radius:5px;background:#00c3ff;color:#000;font-weight:bold;cursor:pointer;}
nav button:hover{background:#0099cc;color:white;}
.container{max-width:1200px;margin:auto;padding:20px;}
.tool{background:#1e1e1e;padding:20px;margin:15px 0;border-radius:10px;box-shadow:0 0 10px #000;}
.tool h2{margin-top:0;}
input,textarea,select,button{font-family:inherit;}
input,textarea,select{width:90%;padding:8px;margin:10px 0;border-radius:5px;border:none;background:#222;color:white;}
button{padding:8px 15px;margin:5px;border:none;border-radius:5px;background:#00c3ff;color:black;cursor:pointer;font-weight:bold;}
button:hover{background:#0099cc;color:white;}
.result{margin-top:10px;background:#000;padding:10px;border-radius:5px;white-space:pre-wrap;}
footer{padding:20px;text-align:center;background:#000;}
footer a{color:#00c3ff;margin:0 5px;text-decoration:none;}
select#language{width:200px;background:#222;color:white;}
</style>
</head>
<body>

<header>
<h1 id="headerTitle">AI Tools Mega - 40+ Tools</h1>
<p id="headerDesc">Boost your content with hashtags, titles, captions, emojis, images, QR codes, colors, text tools, and more!</p>
</header>

<div style="text-align:center;margin:10px;">
<select id="language" onchange="updateLanguage()">
<option value="en">English</option>
<option value="da">Dansk</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
</select>
</div>

<nav id="toolNav">
<!-- Buttons will be auto-filled -->
</nav>

<div class="container" id="toolsContainer">

<!-- Google AdSense Top -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

</div>

<footer>
<p>&copy; 2026 AI Tools Mega | <a href="#header">Home</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>

// --- Tool definitions ---
const tools = [
{name:"Hashtag Generator",id:"hashtags",placeholder:"Enter keyword",func:function(){let word=document.getElementById("hashtags_input").value.trim();if(!word)return;let tags=["#"+word,"#"+word+"tips","#"+word+"creator","#"+word+"content","#"+word+"viral","#"+word+"trend"];document.getElementById("hashtags_result").innerText=tags.join(" ");}},
{name:"YouTube Title Generator",id:"youtube",placeholder:"Enter topic",func:function(){let topic=document.getElementById("youtube_input").value.trim();if(!topic)return;let titles=["10 Things You Must Know About "+topic,"The Truth About "+topic,"How "+topic+" Can Change Your Life","Beginner Guide To "+topic,"Why Everyone Is Talking About "+topic];document.getElementById("youtube_result").innerText=titles.join("\n");}},
{name:"TikTok Caption Generator",id:"tiktok",placeholder:"Enter topic",func:function(){let topic=document.getElementById("tiktok_input").value.trim();if(!topic)return;let captions=[topic+" but nobody talks about this 👀","You NEED to see this "+topic+" trick 🔥",topic+" changed everything 😳","Trying viral "+topic+" trend 🚀",topic+" hack that actually works 💡"];document.getElementById("tiktok_result").innerText=captions.join("\n");}},
{name:"Emoji Enhancer",id:"emoji",placeholder:"Enter text",func:function(){let text=document.getElementById("emoji_input").value;let emojis=["🔥","🚀","😎","💡","✨"];document.getElementById("emoji_result").innerText=text+" "+emojis[Math.floor(Math.random()*emojis.length)];}},
{name:"Word Counter",id:"wordcount",placeholder:"Enter text",func:function(){let text=document.getElementById("wordcount_input").value.trim();let words=text?text.split(/\s+/).length:0;let chars=text.length;document.getElementById("wordcount_result").innerText="Words: "+words+" | Characters: "+chars;}},
{name:"Image Converter",id:"imageconverter",placeholder:"Upload image",func:function(){let file=document.getElementById("imageconverter_input").files[0];if(!file)return alert("Select an image first.");let reader=new FileReader();reader.onload=function(e){let img=new Image();img.onload=function(){let canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;let ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);let url=canvas.toDataURL("image/png");let link=document.getElementById("imageconverter_download");link.href=url;link.download="converted.png";link.innerText="Download Image";};img.src=e.target.result;};reader.readAsDataURL(file);}},
{name:"Password Generator",id:"password",placeholder:"",func:function(){let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";let pass="";for(let i=0;i<16;i++){pass+=chars.charAt(Math.floor(Math.random()*chars.length));}document.getElementById("password_result").innerText=pass;}},
{name:"Random Color Generator",id:"color",placeholder:"",func:function(){let color="#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");document.getElementById("color_result").innerText=color;}},
{name:"QR Code Generator",id:"qrcode",placeholder:"Enter text or URL",func:function(){let text=document.getElementById("qrcode_input").value;QRCode.toCanvas(document.getElementById("qrcode_canvas"), text,{width:200});}},
{name:"Text Case Converter",id:"case",placeholder:"Enter text",func:function(type){let text=document.getElementById("case_input").value;let result="";if(type==="upper")result=text.toUpperCase();else if(type==="lower")result=text.toLowerCase();else if(type==="title")result=text.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();});document.getElementById("case_result").innerText=result;}},
// --- You can add 30 more tools in same format ---
];

// --- Generate HTML ---
const container=document.getElementById("toolsContainer");
const nav=document.getElementById("toolNav");
tools.forEach(tool=>{
let div=document.createElement("div");
div.className="tool";
div.id=tool.id;
let html=`<h2>${tool.name}</h2>`;
if(tool.placeholder!==""){html+=`<input id="${tool.id}_input" placeholder="${tool.placeholder}">`;}
html+=`<button onclick="tools.find(t=>t.id==='${tool.id}').func()">Generate</button>`;
if(tool.id!=="imageconverter" && tool.id!=="case") html+=`<button onclick="downloadText('${tool.id}_result')">Download</button>`;
html+=`<div id="${tool.id}_result" class="result"></div>`;
if(tool.id==="imageconverter") html+=`<a id="imageconverter_download"></a>`;
if(tool.id==="qrcode") html+=`<canvas id="qrcode_canvas"></canvas>`;
if(tool.id==="case"){html+=`<button onclick="tools.find(t=>t.id==='case').func('upper')">UPPERCASE</button><button onclick="tools.find(t=>t.id==='case').func('lower')">lowercase</button><button onclick="tools.find(t=>t.id==='case').func('title')">Title Case</button>`;}
div.innerHTML=html;
container.appendChild(div);

// nav button
let btn=document.createElement("button");
btn.innerText=tool.name;
btn.onclick=function(){div.scrollIntoView({behavior:"smooth"});};
nav.appendChild(btn);
});

// --- Language system ---
const langTexts = {
'en':{headerTitle:"AI Tools Mega - 40+ Tools",headerDesc:"Boost your content with hashtags, titles, captions, emojis, images, QR codes, colors, text tools, and more!"},
'da':{headerTitle:"AI Mega-værktøjer - 40+ værktøjer",headerDesc:"Boost dit indhold med hashtags, titler, captions, emojis, billeder, QR-koder, farver, tekstværktøjer og mere!"},
'es':{headerTitle:"Herramientas AI Mega - 40+ Tools",headerDesc:"Mejora tu contenido con hashtags, títulos, captions, emojis, imágenes, códigos QR, colores, herramientas de texto y más!"},
'de':{headerTitle:"AI Tools Mega - 40+ Tools",headerDesc:"Verbessere deinen Content mit Hashtags, Titeln, Captions, Emojis, Bildern, QR-Codes, Farben, Textwerkzeugen und mehr!"},
'fr':{headerTitle:"Outils AI Mega - 40+ Tools",headerDesc:"Boostez votre contenu avec hashtags, titres, captions, emojis, images, QR codes, couleurs, outils de texte et plus!"}
};

function updateLanguage(){
let lang=document.getElementById('language').value;
document.getElementById('headerTitle').innerText=langTexts[lang].headerTitle;
document.getElementById('headerDesc').innerText=langTexts[lang].headerDesc;
}

// --- Download function ---
function downloadText(id){let text=document.getElementById(id).innerText;let blob=new Blob([text],{type:"text/plain"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="result.txt";a.click();}

</script>

</body>
</html>
