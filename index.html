<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools For Creators</title>

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8036688230923764" crossorigin="anonymous"></script>

<style>
body { font-family: Arial; background: #111; color: white; text-align: center; padding: 20px; margin:0; }
h1 { margin-bottom: 10px; }
.container { max-width: 900px; margin: auto; }
.tool { background: #1e1e1e; padding: 20px; margin: 20px 0; border-radius: 10px; }
input,textarea,select { width: 90%; padding: 10px; margin: 10px; border-radius: 5px; border:none; }
button { padding: 10px 20px; margin:5px; border:none; border-radius:5px; background:#00c3ff; color:white; cursor:pointer; }
button:hover { background:#0099cc; }
.result { margin-top:10px; background:#000; padding:10px; border-radius:5px; word-wrap: break-word; }
footer a { color:#00c3ff; margin:0 5px; text-decoration:none; }
</style>
</head>
<body>

<h1>AI Tools For Creators</h1>

<!-- AdSense top -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div class="container">

<!-- Language Selector -->
<select id="language" onchange="updateLanguage()">
<option value="en">English</option>
<option value="da">Dansk</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
</select>

<!-- Hashtag Generator -->
<div class="tool">
<h2 id="hashtagTitle">Hashtag Generator</h2>
<input id="hashtagInput" placeholder="Enter keyword"><br>
<button onclick="generateHashtags()">Generate</button>
<div id="hashtagResult" class="result"></div>
</div>

<!-- YouTube Title Generator -->
<div class="tool">
<h2 id="ytTitle">YouTube Title Generator</h2>
<input id="ytInput" placeholder="Enter topic"><br>
<button onclick="generateYT()">Generate</button>
<div id="ytResult" class="result"></div>
</div>

<!-- TikTok Caption Generator -->
<div class="tool">
<h2 id="ttTitle">TikTok Caption Generator</h2>
<input id="ttInput" placeholder="Enter topic"><br>
<button onclick="generateTT()">Generate</button>
<div id="ttResult" class="result"></div>
</div>

<!-- Emoji Enhancer -->
<div class="tool">
<h2 id="emojiTitle">Emoji Enhancer</h2>
<textarea id="emojiInput" placeholder="Enter text"></textarea><br>
<button onclick="addEmoji()">Enhance</button>
<div id="emojiResult" class="result"></div>
</div>

<!-- Word Counter -->
<div class="tool">
<h2 id="wordTitle">Word Counter</h2>
<textarea id="wordInput"></textarea><br>
<button onclick="countWords()">Count</button>
<div id="wordResult" class="result"></div>
</div>

<!-- Image Converter -->
<div class="tool">
<h2 id="imageTitle">Image Converter (PNG)</h2>
<input type="file" id="imageInput"><br>
<button onclick="convertImage()">Convert</button><br><br>
<a id="downloadImage"></a>
</div>

<!-- Password Generator -->
<div class="tool">
<h2>Password Generator</h2>
<button onclick="generatePassword()">Generate Password</button>
<div id="passwordResult" class="result"></div>
</div>

<!-- Random Color Generator -->
<div class="tool">
<h2>Random Color Generator</h2>
<button onclick="generateColor()">Generate Color</button>
<div id="colorResult" class="result"></div>
</div>

<!-- QR Code Generator -->
<div class="tool">
<h2>QR Code Generator</h2>
<input id="qrInput" placeholder="Enter text or URL"><br>
<button onclick="generateQR()">Generate QR Code</button>
<br><br>
<canvas id="qrCanvas"></canvas>
</div>

<!-- Text Case Converter -->
<div class="tool">
<h2>Text Case Converter</h2>
<textarea id="caseInput" placeholder="Enter text"></textarea><br>
<button onclick="convertCase('upper')">UPPERCASE</button>
<button onclick="convertCase('lower')">lowercase</button>
<button onclick="convertCase('title')">Title Case</button>
<div id="caseResult" class="result"></div>
</div>

<!-- AdSense bottom -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567892"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
// Language translations
const langTexts = {
'en': {hashtagTitle:"Hashtag Generator",ytTitle:"YouTube Title Generator",ttTitle:"TikTok Caption Generator",emojiTitle:"Emoji Enhancer",wordTitle:"Word Counter",imageTitle:"Image Converter (PNG)"},
'da': {hashtagTitle:"Hashtag-generator",ytTitle:"YouTube-titelgenerator",ttTitle:"TikTok-tekstgenerator",emojiTitle:"Emoji-forstærker",wordTitle:"Ordoptæller",imageTitle:"Billedkonverter (PNG)"},
'es': {hashtagTitle:"Generador de Hashtags",ytTitle:"Generador de Títulos de YouTube",ttTitle:"Generador de Captions de TikTok",emojiTitle:"Mejorador de Emojis",wordTitle:"Contador de Palabras",imageTitle:"Convertidor de Imágenes (PNG)"},
'de': {hashtagTitle:"Hashtag-Generator",ytTitle:"YouTube-Titelgenerator",ttTitle:"TikTok-Caption-Generator",emojiTitle:"Emoji-Enhancer",wordTitle:"Wortzähler",imageTitle:"Bildkonverter (PNG)"},
'fr': {hashtagTitle:"Générateur de Hashtags",ytTitle:"Générateur de Titres YouTube",ttTitle:"Générateur de Captions TikTok",emojiTitle:"Améliorateur d'Emojis",wordTitle:"Compteur de Mots",imageTitle:"Convertisseur d'Images (PNG)"}
};
function updateLanguage(){const lang=document.getElementById('language').value;const texts=langTexts[lang];for(let id in texts){document.getElementById(id).innerText=texts[id];}}

// Tools
function generateHashtags(){let word=document.getElementById("hashtagInput").value;let tags=["#"+word,"#"+word+"Tips","#"+word+"Creator","#"+word+"Content","#"+word+"Viral"];document.getElementById("hashtagResult").innerText=tags.join(" ");}
function generateYT(){let topic=document.getElementById("ytInput").value;let titles=["10 Things About "+topic,"The Truth About "+topic,"How "+topic+" Can Change Your Life","Beginner Guide to "+topic,"Why Everyone Talks About "+topic];document.getElementById("ytResult").innerText=titles.join("\n");}
function generateTT(){let topic=document.getElementById("ttInput").value;let captions=[topic+" but nobody talks about this 👀","You NEED to see this "+topic+" trick 🔥",topic+" changed everything 😳","Trying viral "+topic+" trend 🚀",topic+" hack that works 💡"];document.getElementById("ttResult").innerText=captions.join("\n");}
function addEmoji(){let text=document.getElementById("emojiInput").value;let emojis=["🔥","🚀","😎","💡","✨"];document.getElementById("emojiResult").innerText=text+" "+emojis[Math.floor(Math.random()*emojis.length)];}
function countWords(){let text=document.getElementById("wordInput").value;let words=text.trim().split(/\s+/).length;let chars=text.length;document.getElementById("wordResult").innerText="Words: "+words+" | Characters: "+chars;}
function convertImage(){let file=document.getElementById("imageInput").files[0];let reader=new FileReader();reader.onload=function(e){let img=new Image();img.onload=function(){let canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;let ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);let url=canvas.toDataURL("image/png");let link=document.getElementById("downloadImage");link.href=url;link.download="converted.png";link.innerText="Download Image";};img.src=e.target.result;};reader.readAsDataURL(file);}
function generatePassword(){let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";let pass="";for(let i=0;i<16;i++){pass+=chars.charAt(Math.floor(Math.random()*chars.length));}document.getElementById("passwordResult").innerText=pass;}
function generateColor(){let color="#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");document.getElementById("colorResult").innerText=color;}
function generateQR(){let text=document.getElementById("qrInput").value;QRCode.toCanvas(document.getElementById("qrCanvas"), text, {width:200});}
function convertCase(type){let text=document.getElementById("caseInput").value;let result="";if(type==="upper"){result=text.toUpperCase();}else if(type==="lower"){result=text.toLowerCase();}else if(type==="title"){result=text.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();});}document.getElementById("caseResult").innerText=result;}
</script>

</body>
</html>
