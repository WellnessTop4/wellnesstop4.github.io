<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools For Creators</title>

<!-- Google AdSense script -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8036688230923764"
     crossorigin="anonymous"></script>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
h1{margin-bottom:10px;}
.container{max-width:800px;margin:auto;}
.tool{background:#1e1e1e;padding:20px;margin:20px 0;border-radius:10px;}
input,textarea,select{width:90%;padding:10px;margin:10px;border-radius:5px;border:none;}
button{padding:10px 20px;margin:5px;border:none;border-radius:5px;background:#00c3ff;color:white;cursor:pointer;}
button:hover{background:#0099cc;}
.result{margin-top:10px;background:#000;padding:10px;border-radius:5px;}
footer a{color:#00c3ff;margin:0 5px;text-decoration:none;}
</style>
</head>

<body>

<h1>AI Tools For Creators</h1>

<!-- AdSense annonceblok #1 -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567890"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<select id="language">
<option value="en">English</option>
<option value="da">Dansk</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
<option value="fr">Français</option>
</select>

<div class="container">

<!-- Hashtag Generator -->
<div class="tool">
<h2>Hashtag Generator</h2>
<input id="hashtagInput" placeholder="Enter keyword">
<br>
<button onclick="generateHashtags()">Generate</button>
<button onclick="downloadText('hashtagResult')">Download</button>
<div id="hashtagResult" class="result"></div>
</div>

<!-- AdSense annonceblok #2 -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567891"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<!-- YouTube Title Generator -->
<div class="tool">
<h2>YouTube Title Generator</h2>
<input id="ytInput" placeholder="Enter topic">
<br>
<button onclick="generateYT()">Generate</button>
<button onclick="downloadText('ytResult')">Download</button>
<div id="ytResult" class="result"></div>
</div>

<!-- TikTok Caption -->
<div class="tool">
<h2>TikTok Caption Generator</h2>
<input id="ttInput" placeholder="Enter topic">
<br>
<button onclick="generateTT()">Generate</button>
<button onclick="downloadText('ttResult')">Download</button>
<div id="ttResult" class="result"></div>
</div>

<!-- Emoji Enhancer -->
<div class="tool">
<h2>Emoji Enhancer</h2>
<textarea id="emojiInput" placeholder="Enter text"></textarea>
<br>
<button onclick="addEmoji()">Enhance</button>
<button onclick="downloadText('emojiResult')">Download</button>
<div id="emojiResult" class="result"></div>
</div>

<!-- Word Counter -->
<div class="tool">
<h2>Word Counter</h2>
<textarea id="wordInput"></textarea>
<br>
<button onclick="countWords()">Count</button>
<div id="wordResult" class="result"></div>
</div>

<!-- Image Converter -->
<div class="tool">
<h2>Image Converter (PNG)</h2>
<input type="file" id="imageInput">
<br>
<button onclick="convertImage()">Convert</button>
<br><br>
<a id="downloadImage"></a>
</div>

<!-- AdSense annonceblok #3 -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8036688230923764"
     data-ad-slot="1234567892"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

</div>

<footer>
<p>
<a href="about.html">About</a> | 
<a href="privacy.html">Privacy Policy</a> | 
<a href="guide.html">Guide</a>
</p>
</footer>

<script>
// Download text
function downloadText(id){
    let text=document.getElementById(id).innerText;
    let blob=new Blob([text],{type:"text/plain"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="result.txt";
    a.click();
}

// Hashtag Generator
function generateHashtags(){
    let word=document.getElementById("hashtagInput").value;
    let tags=["#"+word,"#"+word+"tips","#"+word+"creator","#"+word+"content","#"+word+"viral","#"+word+"trend"];
    document.getElementById("hashtagResult").innerText=tags.join(" ");
}

// YouTube Title Generator
function generateYT(){
    let topic=document.getElementById("ytInput").value;
    let titles=[
        "10 Things You Must Know About "+topic,
        "The Truth About "+topic,
        "How "+topic+" Can Change Your Life",
        "Beginner Guide To "+topic,
        "Why Everyone Is Talking About "+topic
    ];
    document.getElementById("ytResult").innerText=titles.join("\n");
}

// TikTok Caption Generator
function generateTT(){
    let topic=document.getElementById("ttInput").value;
    let captions=[
        topic+" but nobody talks about this 👀",
        "You NEED to see this "+topic+" trick 🔥",
        topic+" changed everything 😳",
        "Trying viral "+topic+" trend 🚀",
        topic+" hack that actually works 💡"
    ];
    document.getElementById("ttResult").innerText=captions.join("\n");
}

// Emoji Enhancer
function addEmoji(){
    let text=document.getElementById("emojiInput").value;
    let emojis=["🔥","🚀","😎","💡","✨"];
    let result=text+" "+emojis[Math.floor(Math.random()*emojis.length)];
    document.getElementById("emojiResult").innerText=result;
}

// Word Counter
function countWords(){
    let text=document.getElementById("wordInput").value;
    let words=text.trim().split(/\s+/).length;
    let chars=text.length;
    document.getElementById("wordResult").innerText="Words: "+words+" | Characters: "+chars;
}

// Image Converter
function convertImage(){
    let file=document.getElementById("imageInput").files[0];
    let reader=new FileReader();
    reader.onload=function(e){
        let img=new Image();
        img.onload=function(){
            let canvas=document.createElement("canvas");
            canvas.width=img.width;
            canvas.height=img.height;
            let ctx=canvas.getContext("2d");
            ctx.drawImage(img,0,0);
            let url=canvas.toDataURL("image/png");
            let link=document.getElementById("downloadImage");
            link.href=url;
            link.download="converted.png";
            link.innerText="Download Image";
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
